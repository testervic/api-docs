<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>API 文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #4a6cf7;
      --sidebar-width: 260px;
      --base-font-size: 15px;
    }
    .sidebar .app-name-link {
      font-weight: 700;
      font-size: 1.1em;
    }
    /* Method badges */
    .badge-get    { background:#61affe; color:#fff; padding:2px 8px; border-radius:3px; font-size:.75em; font-weight:700; }
    .badge-post   { background:#49cc90; color:#fff; padding:2px 8px; border-radius:3px; font-size:.75em; font-weight:700; }
    .badge-put    { background:#fca130; color:#fff; padding:2px 8px; border-radius:3px; font-size:.75em; font-weight:700; }
    .badge-delete { background:#f93e3e; color:#fff; padding:2px 8px; border-radius:3px; font-size:.75em; font-weight:700; }
    .badge-patch  { background:#50e3c2; color:#fff; padding:2px 8px; border-radius:3px; font-size:.75em; font-weight:700; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'My API Docs',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索文档...',
        noData: '没有找到相关内容',
        depth: 3,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true,
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
